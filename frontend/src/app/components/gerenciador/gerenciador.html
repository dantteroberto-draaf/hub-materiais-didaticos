<div class="min-h-screen bg-gray-100 p-8 font-sans">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Hub de Materiais Didáticos</h1>

    <form [formGroup]="formulario" class="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-col gap-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600 mb-1">Título</label>
          <input type="text" formControlName="titulo" class="border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600 mb-1">Tipo</label>
          <select formControlName="tipo" class="border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
            <option value="Link">Link</option>
            <option value="PDF">PDF</option>
            <option value="Vídeo">Vídeo</option>
          </select>
        </div>
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-600 mb-1">Link</label>
        <input type="url" formControlName="link" class="border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-600 mb-1">Descrição</label>
        <textarea formControlName="descricao" rows="3" class="border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-600 mb-1">Tags (separadas por vírgula)</label>
        <input type="text" formControlName="tags" class="border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="flex gap-4 mt-4">
        <button type="button" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded transition-colors shadow-sm">
          Salvar Recurso
        </button>
        <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors shadow-sm flex items-center gap-2">
          ✨ Gerar descrição com IA
        </button>
      </div>
    </form>

    <h2 class="text-2xl font-bold text-gray-800 mb-4">Meus Recursos</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (recurso of listaRecursos; track recurso.id) {
        <div class="bg-white p-5 rounded-lg shadow border-l-4 border-blue-500 flex flex-col justify-between">
          <div>
            <h3 class="font-bold text-xl text-gray-800">{{ recurso.titulo }}</h3>
            <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full mt-1">{{ recurso.tipo }}</span>
            <p class="mt-3 text-gray-600 text-sm line-clamp-3">{{ recurso.descricao }}</p>

            <div class="mt-3 flex flex-wrap gap-1">
              @for (tag of recurso.tags; track tag) {
                <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border border-gray-200">{{ tag }}</span>
              }
            </div>
          </div>

          <div class="mt-5 pt-4 border-t border-gray-100 flex justify-between items-center">
            <a [href]="recurso.link" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm font-semibold">Acessar Link ↗</a>
            <button class="text-gray-400 hover:text-red-500 transition-colors" title="Deletar">🗑️</button>
          </div>
        </div>
      } @empty {
        <div class="col-span-full text-center p-12 bg-white rounded-lg border-2 border-dashed border-gray-300">
          <p class="text-gray-500 text-lg">Nenhum recurso educacional cadastrado ainda.</p>
        </div>
      }
    </div>
  </div>
</div>
